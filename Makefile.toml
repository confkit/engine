[config]
default_to_workspace = false

# 基础任务

[tasks.setup]
description = "安装开发依赖"
script = [
  "cargo install cargo-watch",
  "cargo install cargo-edit",
  "cargo install cargo-audit",
]

[tasks.update]
args = ["update"]
command = "cargo"
description = "更新依赖"

[tasks.dev]
dependencies = [
  "clean",
  "check-format",
  "lint",
  "test",
  "build",
]
description = "开发流程 - 清理、检查格式、测试和构建"

[tasks.watch]
args = ["watch", "-x", "check", "-x", "build", "-i", "examples/**/*", "-i", "docs/**/*"]
command = "cargo"
description = "监听变化并重新构建"
install_crate = "cargo-watch"

[tasks.doc]
description = "生成文档"
command = "cargo"
args = ["doc", "--open"]

# 辅助任务

[tasks.clean]
args = ["clean"]
command = "cargo"
description = "清理构建产物"

[tasks.check]
args = ["check"]
command = "cargo"
dependencies = ["check-format", "clippy"]
description = "检查编译"

[tasks.check-format]
args = ["fmt", "--check"]
command = "cargo"
description = "检查代码格式"

[tasks.format]
args = ["fmt"]
command = "cargo"
description = "格式化代码"

[tasks.lint]
args = [
  "clippy",
  "--all-targets",
  "--all-features",
  "--",
  "-W",
  "clippy::complexity",
  "-W",
  "clippy::correctness",
  "-A",
  "dead_code",
  "-A",
  "unused_imports",
  "-A",
  "unused_variables",
]
command = "cargo"
description = "运行 clippy lints"

[tasks.test]
args = ["test"]
command = "cargo"
description = "运行所有测试"

[tasks.test-unit]
args = ["test", "--lib"]
command = "cargo"
description = "仅运行单元测试"

[tasks.test-integration]
args = ["test", "--test", "*"]
command = "cargo"
description = "仅运行集成测试"

[tasks.test-condition]
args = ["test", "--test", "condition_unit_tests", "--", "--test-threads=1", "--nocapture"]
command = "cargo"
description = "运行条件模块单元测试 (顺序执行, 显示打印输出)"

[tasks.test-condition-expression]
args = ["test", "--test", "condition_expression_tests", "--", "--test-threads=1", "--nocapture"]
command = "cargo"
description = "运行条件表达式解析测试 (顺序执行, 显示打印输出)"

[tasks.test-condition-all]
dependencies = ["test-condition", "test-condition-expression"]
description = "运行所有条件模块测试"


[tasks.profile]
args = ["build", "--release", "--profile", "profiling"]
command = "cargo"
description = "性能分析构建"

[tasks.bench]
args = ["bench"]
command = "cargo"
description = "运行基准测试"

[tasks.audit]
args = ["audit"]
command = "cargo"
description = "安全审计"
install_crate = "cargo-audit"

[tasks.test-verbose]
args = ["test", "--", "--nocapture"]
command = "cargo"
description = "详细测试输出"

# Linux targets

[tasks.setup-linux-x86_64]
args = ["target", "add", "x86_64-unknown-linux-gnu"]
command = "rustup"
description = "Setup Linux x86_64 target"

[tasks.setup-linux-aarch64]
args = ["target", "add", "aarch64-unknown-linux-gnu"]
command = "rustup"
description = "Setup Linux aarch64 target"

[tasks.build-x86_64-unknown-linux-gnu]
args = ["build", "--target", "x86_64-unknown-linux-gnu", "--release"]
command = "cargo"
dependencies = ["setup-linux-x86_64"]
description = "Build release version for x86_64-unknown-linux-gnu"

[tasks.build-aarch64-unknown-linux-gnu]
args = ["build", "--target", "aarch64-unknown-linux-gnu", "--release"]
command = "cargo"
dependencies = ["setup-linux-aarch64"]
description = "Build release version for aarch64-unknown-linux-gnu"

# macOS targets

[tasks.setup-macos-x86_64]
args = ["target", "add", "x86_64-apple-darwin"]
command = "rustup"
description = "Setup macOS x86_64 target"

[tasks.setup-macos-aarch64]
args = ["target", "add", "aarch64-apple-darwin"]
command = "rustup"
description = "Setup macOS aarch64 target"

[tasks.build-x86_64-apple-darwin]
args = ["build", "--target", "x86_64-apple-darwin", "--release"]
command = "cargo"
dependencies = ["setup-macos-x86_64"]
description = "Build release version for x86_64-apple-darwin"

[tasks.build-aarch64-apple-darwin]
args = ["build", "--target", "aarch64-apple-darwin", "--release"]
command = "cargo"
dependencies = ["setup-macos-aarch64"]
description = "Build release version for aarch64-apple-darwin"

# Build release version for all targets

[tasks.build-macos]
args = ["Build release version for macOS"]
command = "echo"
dependencies = [
  "build-x86_64-apple-darwin",
  "build-aarch64-apple-darwin",
]
description = "Build release version for macOS"

[tasks.build-linux]
args = ["Build release version for Linux"]
command = "echo"
dependencies = [
  "build-x86_64-unknown-linux-gnu",
  "build-aarch64-unknown-linux-gnu",
]
description = "Build release version for Linux"
